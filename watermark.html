<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaterMark Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #f76ac8;
    --accent3: #6af7c8;
    --text: #e8e8f0;
    --text-dim: #6b6b85;
    --text-dimmer: #3a3a55;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow blobs */
  body::after {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124,106,247,0.08) 0%, transparent 70%);
    top: -200px;
    right: -200px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  /* HEADER */
  header {
    padding: 36px 0 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .logo-mark {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    color: white;
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  h1 span {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* MAIN LAYOUT */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 24px;
    align-items: start;
  }

  /* DROP ZONE */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 20px;
    background: var(--surface);
    min-height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(124,106,247,0.05);
  }

  .drop-zone.has-image {
    border-style: solid;
    border-color: var(--border);
    min-height: unset;
    padding: 0;
  }

  .drop-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .drop-text {
    text-align: center;
  }

  .drop-text strong {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .drop-text span {
    font-size: 12px;
    color: var(--text-dim);
  }

  .drop-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: 0.3px;
  }

  .drop-btn:hover { opacity: 0.85; }

  /* CANVAS WRAPPER */
  .canvas-wrapper {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
  }

  #previewCanvas {
    display: block;
    width: 100%;
    height: auto;
    max-height: 560px;
    object-fit: contain;
  }

  /* PANEL */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .panel-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* FORM CONTROLS */
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  input[type="text"],
  input[type="number"],
  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input[type="text"]:focus,
  input[type="number"]:focus,
  select:focus {
    border-color: var(--accent);
  }

  select option {
    background: var(--surface2);
  }

  /* RANGE */
  .range-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  input[type="range"] {
    flex: 1;
    appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    cursor: pointer;
    transition: transform 0.1s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  .range-val {
    font-size: 12px;
    color: var(--accent);
    width: 38px;
    text-align: right;
    flex-shrink: 0;
  }

  /* COLOR PICKER */
  .color-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  input[type="color"] {
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: none;
    cursor: pointer;
    padding: 2px;
    flex-shrink: 0;
  }

  .color-hex {
    flex: 1;
  }

  /* POSITION GRID */
  .pos-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
  }

  .pos-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .pos-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .pos-btn.active {
    background: rgba(124,106,247,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    padding: 4px;
    border-radius: 12px;
  }

  .tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 8px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }

  .tab-content { display: none; }
  .tab-content.active { display: flex; flex-direction: column; gap: 12px; }

  /* TOGGLE */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .toggle-row label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .toggle {
    position: relative;
    width: 40px;
    height: 22px;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 11px;
    cursor: pointer;
    transition: 0.2s;
  }

  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    background: white;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: 0.2s;
  }

  .toggle input:checked + .toggle-slider {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .toggle input:checked + .toggle-slider::before {
    transform: translateX(18px);
  }

  /* EXPORT BUTTONS */
  .export-btns {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .export-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }

  .export-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(124,106,247,0.08);
    transform: translateY(-1px);
  }

  .export-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .export-btn .btn-icon {
    font-size: 18px;
  }

  .export-btn .btn-info {
    display: flex;
    flex-direction: column;
    text-align: left;
  }

  .export-btn .btn-sub {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-weight: 400;
    margin-top: 1px;
  }

  .export-btn.png { border-color: rgba(106,247,200,0.3); }
  .export-btn.png:hover:not(:disabled) { border-color: var(--accent3); background: rgba(106,247,200,0.05); }

  .export-btn.jpg { border-color: rgba(247,106,200,0.3); }
  .export-btn.jpg:hover:not(:disabled) { border-color: var(--accent2); background: rgba(247,106,200,0.05); }

  .export-btn.pdf { border-color: rgba(124,106,247,0.3); }
  .export-btn.pdf:hover:not(:disabled) { border-color: var(--accent); background: rgba(124,106,247,0.08); }

  /* DIVIDER */
  hr {
    border: none;
    border-top: 1px solid var(--border);
  }

  /* NO IMAGE STATE */
  .no-img-overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 13px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    z-index: 1000;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .main-grid { grid-template-columns: 1fr; }
    h1 { font-size: 22px; }
  }

  /* LOGO IMAGE */
  .logo-upload-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-upload-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px dashed var(--border);
    color: var(--text-dim);
    padding: 9px 12px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    letter-spacing: 0.5px;
  }

  .logo-upload-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .logo-preview-thumb {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    object-fit: contain;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: none;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-mark">W</div>
    <div>
      <h1>Water<span>Mark</span> Studio</h1>
      <div class="tagline">Tambahkan watermark profesional ke foto Anda</div>
    </div>
  </header>

  <div class="main-grid">
    <!-- LEFT: Canvas/Drop Zone -->
    <div>
      <div class="drop-zone" id="dropZone">
        <div class="no-img-overlay" id="noImgState">
          <div class="drop-icon">🖼️</div>
          <div class="drop-text">
            <strong>Seret foto ke sini</strong>
            <span>atau klik tombol di bawah untuk memilih file</span>
          </div>
          <button class="drop-btn" onclick="document.getElementById('fileInput').click()">Pilih Foto</button>
          <div class="drop-text">
            <span>Mendukung: JPG, PNG, WEBP — Maks 20MB</span>
          </div>
        </div>
        <div class="canvas-wrapper" id="canvasWrapper" style="display:none; width:100%;">
          <canvas id="previewCanvas"></canvas>
        </div>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <!-- RIGHT: Control Panel -->
    <div class="panel">

      <!-- TABS: Teks / Logo -->
      <div class="panel-section">
        <div class="section-label">Tipe Watermark</div>
        <div class="tabs">
          <button class="tab active" onclick="switchTab('text')">✏️ Teks</button>
          <button class="tab" onclick="switchTab('logo')">🖼 Logo</button>
        </div>

        <!-- TAB TEXT -->
        <div class="tab-content active" id="tab-text">
          <div class="field">
            <label>Teks Watermark</label>
            <input type="text" id="wmText" value="© Foto Saya" placeholder="Tulis watermark...">
          </div>
          <div class="field">
            <label>Font</label>
            <select id="wmFont">
              <option value="Arial">Arial</option>
              <option value="Georgia">Georgia</option>
              <option value="'Courier New'">Courier New</option>
              <option value="'Times New Roman'">Times New Roman</option>
              <option value="Impact">Impact</option>
              <option value="Verdana">Verdana</option>
            </select>
          </div>
          <div class="field">
            <label>Ukuran Font — <span id="fontSizeVal">36</span>px</label>
            <div class="range-row">
              <input type="range" id="wmFontSize" min="10" max="200" value="36">
              <span class="range-val" id="fontSizeDisplay">36</span>
            </div>
          </div>
          <div class="field">
            <label>Warna Teks</label>
            <div class="color-row">
              <input type="color" id="wmColor" value="#ffffff">
              <input type="text" id="wmColorHex" class="color-hex" value="#ffffff" maxlength="7">
            </div>
          </div>
          <div class="toggle-row">
            <label>Bold</label>
            <label class="toggle"><input type="checkbox" id="wmBold" checked><span class="toggle-slider"></span></label>
          </div>
          <div class="toggle-row">
            <label>Italic</label>
            <label class="toggle"><input type="checkbox" id="wmItalic"><span class="toggle-slider"></span></label>
          </div>
        </div>

        <!-- TAB LOGO -->
        <div class="tab-content" id="tab-logo">
          <div class="field">
            <label>Upload Logo / Gambar</label>
            <div class="logo-upload-row">
              <div class="logo-upload-btn" onclick="document.getElementById('logoInput').click()">
                📁 Pilih Logo (PNG transparan)
              </div>
              <img id="logoThumb" class="logo-preview-thumb" src="" alt="logo preview">
            </div>
            <input type="file" id="logoInput" accept="image/*" style="display:none">
          </div>
          <div class="field">
            <label>Ukuran Logo — <span id="logoSizeVal">20</span>%</label>
            <div class="range-row">
              <input type="range" id="wmLogoSize" min="5" max="80" value="20">
              <span class="range-val" id="logoSizeDisplay">20%</span>
            </div>
          </div>
        </div>
      </div>

      <hr>

      <!-- POSISI -->
      <div class="panel-section">
        <div class="section-label">Posisi</div>
        <div class="pos-grid" id="posGrid">
          <button class="pos-btn" data-pos="top-left">↖</button>
          <button class="pos-btn" data-pos="top-center">↑</button>
          <button class="pos-btn" data-pos="top-right">↗</button>
          <button class="pos-btn" data-pos="center-left">←</button>
          <button class="pos-btn" data-pos="center">✛</button>
          <button class="pos-btn" data-pos="center-right">→</button>
          <button class="pos-btn" data-pos="bottom-left">↙</button>
          <button class="pos-btn" data-pos="bottom-center">↓</button>
          <button class="pos-btn active" data-pos="bottom-right">↘</button>
        </div>
        <div class="toggle-row">
          <label>Ulangi (tile)</label>
          <label class="toggle"><input type="checkbox" id="wmTile"><span class="toggle-slider"></span></label>
        </div>
      </div>

      <hr>

      <!-- OPACITY & ROTATE -->
      <div class="panel-section">
        <div class="section-label">Tampilan</div>
        <div class="field">
          <label>Transparansi</label>
          <div class="range-row">
            <input type="range" id="wmOpacity" min="1" max="100" value="60">
            <span class="range-val" id="opacityDisplay">60%</span>
          </div>
        </div>
        <div class="field">
          <label>Rotasi</label>
          <div class="range-row">
            <input type="range" id="wmRotate" min="-180" max="180" value="-30">
            <span class="range-val" id="rotateDisplay">-30°</span>
          </div>
        </div>
        <div class="field">
          <label>Margin (px)</label>
          <input type="number" id="wmMargin" value="20" min="0" max="200">
        </div>
      </div>

      <hr>

      <!-- EXPORT -->
      <div class="panel-section">
        <div class="section-label">Simpan Sebagai</div>
        <div class="export-btns">
          <button class="export-btn png" id="btnPNG" onclick="exportImage('png')" disabled>
            <span class="btn-icon">🟢</span>
            <span class="btn-info">
              <span>Simpan PNG</span>
              <span class="btn-sub">Transparan · Kualitas terbaik</span>
            </span>
          </button>
          <button class="export-btn jpg" id="btnJPG" onclick="exportImage('jpg')" disabled>
            <span class="btn-icon">🌸</span>
            <span class="btn-info">
              <span>Simpan JPG</span>
              <span class="btn-sub">File lebih kecil · Foto umum</span>
            </span>
          </button>
          <button class="export-btn pdf" id="btnPDF" onclick="exportImage('pdf')" disabled>
            <span class="btn-icon">📄</span>
            <span class="btn-info">
              <span>Simpan PDF</span>
              <span class="btn-sub">Dokumen cetak profesional</span>
            </span>
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✅ Berhasil disimpan!</div>

<script>
// STATE
let originalImage = null;
let logoImage = null;
let currentTab = 'text';
let selectedPos = 'bottom-right';

// DOM REFS
const fileInput = document.getElementById('fileInput');
const logoInput = document.getElementById('logoInput');
const dropZone = document.getElementById('dropZone');
const canvasWrapper = document.getElementById('canvasWrapper');
const noImgState = document.getElementById('noImgState');
const canvas = document.getElementById('previewCanvas');
const ctx = canvas.getContext('2d');

// -------- LOAD IMAGE --------
fileInput.addEventListener('change', e => loadImage(e.target.files[0]));

logoInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      logoImage = img;
      document.getElementById('logoThumb').src = ev.target.result;
      document.getElementById('logoThumb').style.display = 'block';
      renderWatermark();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function loadImage(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      originalImage = img;
      noImgState.style.display = 'none';
      canvasWrapper.style.display = 'block';
      dropZone.classList.add('has-image');
      enableButtons(true);
      renderWatermark();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// -------- DRAG & DROP --------
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadImage(file);
});
dropZone.addEventListener('click', e => {
  if (originalImage && e.target.closest('.canvas-wrapper')) return;
  if (!originalImage) fileInput.click();
});

// -------- TABS --------
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='text')||(i===1 && tab==='logo')));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderWatermark();
}

// -------- POSITION GRID --------
document.querySelectorAll('.pos-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedPos = btn.dataset.pos;
    renderWatermark();
  });
});

// -------- LIVE CONTROLS --------
function addListener(id, cb) {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', cb || renderWatermark);
}

addListener('wmText');
addListener('wmFont');
addListener('wmFontSize', () => {
  document.getElementById('fontSizeDisplay').textContent = document.getElementById('wmFontSize').value;
  renderWatermark();
});
addListener('wmColor', () => {
  document.getElementById('wmColorHex').value = document.getElementById('wmColor').value;
  renderWatermark();
});
document.getElementById('wmColorHex').addEventListener('input', () => {
  const v = document.getElementById('wmColorHex').value;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) {
    document.getElementById('wmColor').value = v;
    renderWatermark();
  }
});
addListener('wmBold');
addListener('wmItalic');
addListener('wmOpacity', () => {
  document.getElementById('opacityDisplay').textContent = document.getElementById('wmOpacity').value + '%';
  renderWatermark();
});
addListener('wmRotate', () => {
  document.getElementById('rotateDisplay').textContent = document.getElementById('wmRotate').value + '°';
  renderWatermark();
});
addListener('wmMargin');
addListener('wmTile');
addListener('wmLogoSize', () => {
  const v = document.getElementById('wmLogoSize').value;
  document.getElementById('logoSizeDisplay').textContent = v + '%';
  renderWatermark();
});

// -------- RENDER --------
function renderWatermark() {
  if (!originalImage) return;

  // Fit canvas to image
  const maxW = 1600;
  let iw = originalImage.width, ih = originalImage.height;
  if (iw > maxW) { ih = Math.round(ih * maxW / iw); iw = maxW; }
  canvas.width = iw;
  canvas.height = ih;

  ctx.drawImage(originalImage, 0, 0, iw, ih);

  const opacity = parseInt(document.getElementById('wmOpacity').value) / 100;
  const rotate = parseInt(document.getElementById('wmRotate').value) * Math.PI / 180;
  const margin = parseInt(document.getElementById('wmMargin').value) || 20;
  const tile = document.getElementById('wmTile').checked;

  ctx.save();
  ctx.globalAlpha = opacity;

  if (currentTab === 'text') {
    const text = document.getElementById('wmText').value || '© Watermark';
    const fontSize = parseInt(document.getElementById('wmFontSize').value);
    const font = document.getElementById('wmFont').value;
    const bold = document.getElementById('wmBold').checked ? 'bold ' : '';
    const italic = document.getElementById('wmItalic').checked ? 'italic ' : '';
    const color = document.getElementById('wmColor').value;

    ctx.font = `${italic}${bold}${fontSize}px ${font}`;
    ctx.fillStyle = color;
    ctx.textBaseline = 'middle';

    const metrics = ctx.measureText(text);
    const tw = metrics.width;
    const th = fontSize;

    if (tile) {
      drawTile(() => ctx.fillText(text, -tw/2, 0), tw, th, rotate, iw, ih);
    } else {
      const [x, y] = getPosition(selectedPos, iw, ih, tw, th, margin);
      ctx.translate(x, y);
      ctx.rotate(rotate);
      ctx.fillText(text, -tw/2, 0);
    }
  } else {
    // Logo
    if (!logoImage) { ctx.restore(); return; }
    const logoSizePct = parseInt(document.getElementById('wmLogoSize').value) / 100;
    const lw = Math.round(iw * logoSizePct);
    const lh = Math.round(lw * logoImage.height / logoImage.width);

    if (tile) {
      drawTile(() => ctx.drawImage(logoImage, -lw/2, -lh/2, lw, lh), lw, lh, rotate, iw, ih);
    } else {
      const [x, y] = getPosition(selectedPos, iw, ih, lw, lh, margin);
      ctx.translate(x, y);
      ctx.rotate(rotate);
      ctx.drawImage(logoImage, -lw/2, -lh/2, lw, lh);
    }
  }

  ctx.restore();
}

function drawTile(drawFn, elemW, elemH, rotate, canvasW, canvasH) {
  const gapX = Math.max(elemW * 1.5, 80);
  const gapY = Math.max(elemH * 2, 60);
  for (let row = -2; row < Math.ceil(canvasH / gapY) + 2; row++) {
    for (let col = -2; col < Math.ceil(canvasW / gapX) + 2; col++) {
      const x = col * gapX + (row % 2 === 0 ? 0 : gapX / 2);
      const y = row * gapY;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotate);
      drawFn();
      ctx.restore();
    }
  }
}

function getPosition(pos, cw, ch, ew, eh, margin) {
  const half = [ew/2, eh/2];
  const map = {
    'top-left':      [margin + half[0],       margin + half[1]],
    'top-center':    [cw/2,                   margin + half[1]],
    'top-right':     [cw - margin - half[0],  margin + half[1]],
    'center-left':   [margin + half[0],       ch/2],
    'center':        [cw/2,                   ch/2],
    'center-right':  [cw - margin - half[0],  ch/2],
    'bottom-left':   [margin + half[0],       ch - margin - half[1]],
    'bottom-center': [cw/2,                   ch - margin - half[1]],
    'bottom-right':  [cw - margin - half[0],  ch - margin - half[1]],
  };
  return map[pos] || map['bottom-right'];
}

// -------- EXPORT --------
function exportImage(type) {
  if (!originalImage) return;
  renderWatermark();

  const filename = 'watermark-' + Date.now();

  if (type === 'png') {
    const url = canvas.toDataURL('image/png');
    download(url, filename + '.png');
  } else if (type === 'jpg') {
    const url = canvas.toDataURL('image/jpeg', 0.92);
    download(url, filename + '.jpg');
  } else if (type === 'pdf') {
    const { jsPDF } = window.jspdf;
    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    const orientation = canvas.width > canvas.height ? 'landscape' : 'portrait';
    const pdf = new jsPDF({
      orientation,
      unit: 'px',
      format: [canvas.width, canvas.height],
      hotfixes: ['px_scaling']
    });
    pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height);
    pdf.save(filename + '.pdf');
  }

  showToast('✅ File berhasil disimpan!');
}

function download(url, name) {
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.click();
}

function enableButtons(on) {
  ['btnPNG','btnJPG','btnPDF'].forEach(id => {
    document.getElementById(id).disabled = !on;
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
